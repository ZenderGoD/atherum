# Atherum — Local Development Infrastructure
#
# Storage is handled by Convex (cloud). This file only contains
# services that must run locally.
#
# Usage: docker compose -f infra/docker-compose.yml up -d

services:
  oasis-worker:
    build:
      context: ../apps/oasis-worker
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      OASIS_PORT: 4001
      OASIS_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
